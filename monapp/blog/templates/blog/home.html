<!DOCTYPE html>
<html>
<head>
    <title>Mon Blog</title>
</head>
<body>
    <h1>Bienvenue sur mon blog 🚀</h1>
    <p>Ceci est ma première page Django avec HTML.</p>

    <ul>
        {% for p in posts %}
        <li>
            {{ p.title }}
            <p>{{ p.content }}</p>
            <p>Date de publication : {{ p.created_at }}</p>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
